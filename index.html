<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEARN POKER — Master Every Position</title>
    <script>
    /* ── PORTÃO DE ACESSO Suprema OS: o login mora no hub. Sem sessão
       'suprema_session_v1', volta pro hub (2 níveis acima: /learn-poker/dist/). ── */
    (function(){
      try{
        var s = JSON.parse(localStorage.getItem('suprema_session_v1') || 'null');
        if(!s || !s.email || !s.expiresAt || Date.now() > s.expiresAt) location.replace('../../hub.html');
      }catch(e){ location.replace('../../hub.html'); }
    })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
